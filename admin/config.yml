# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: antonyjohnt18-crypto/castle-packaging-website
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/706c4a94-424b-4974-849e-76f394a72c33/pkce
  auth_token_endpoint: /sites/706c4a94-424b-4974-849e-76f394a72c33/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://willowy-axolotl-5288ff.netlify.app

media_folder: ""
public_folder: "/"

collections:
  - name: "company"
    label: "Company & Contact Info"
    files:
      - file: "data-company.json"
        label: "Contact & Company Details"
        name: "company"
        fields:
          - { label: "Company Name", name: "companyName", widget: "string" }
          - { label: "Address Lines (one per line)", name: "addressLines", widget: "list" }
          - { label: "Phone (how it's shown)", name: "phoneDisplay", widget: "string", hint: "e.g. +91 96115 35171" }
          - { label: "Phone (for the click-to-call link)", name: "phoneDial", widget: "string", hint: "No spaces, e.g. +919611535171" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "GSTIN", name: "gstin", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsappNumber", widget: "string", hint: "Country code + number, no + or spaces, e.g. 919611535171" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "Facebook URL", name: "facebook", widget: "string" }
          - { label: "Twitter / X URL", name: "twitter", widget: "string" }

  - name: "products"
    label: "Products"
    files:
      - file: "data-products.json"
        label: "Product Catalog"
        name: "productCatalog"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "Internal ID (no spaces, keep unique)", name: "id", widget: "string" }
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Variant / Category Label", name: "variant", widget: "string", hint: "e.g. Kraft Paper, or Semi Soft · Soft · Virgin Cellulose Fibre" }
              - label: "Accent Color"
                name: "variantColor"
                widget: "select"
                options: ["gold", "sage", "kraft"]
                hint: "Just a visual accent color for the label on the site"
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Photo", name: "image", widget: "image" }

  - name: "news"
    label: "News & Updates"
    files:
      - file: "data-news.json"
        label: "News Posts"
        name: "newsPosts"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Internal ID (no spaces, keep unique)", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date (shown as typed, e.g. 21 Jul 2026)", name: "date", widget: "string" }
              - { label: "Short Text", name: "excerpt", widget: "text" }
              - { label: "Photo 1 (optional)", name: "image1", widget: "image", required: false }
              - { label: "Photo 2 (optional)", name: "image2", widget: "image", required: false }
